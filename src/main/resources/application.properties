# ── Server ──────────────────────────────────────────
server.port=8080

# ── MySQL via WAMP ───────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/chatapp_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ──────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── JWT Secret (change this to any long random string) ──
jwt.secret=mySecretKey1234567890ABCDEFGHIJKLMNOPQRSTUVWXYZabcdef
jwt.expiration=86400000